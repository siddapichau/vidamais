<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../css/style.css">
    <style>body { padding: 20px; }</style>
</head>
<body>

    <div class="card" style="text-align: center; padding: 60px 20px;">
        <img src="../logo.png" style="width: 120px; margin-bottom: 20px;">
        <h1>Bem-vindo ao Vida+ AI</h1>
        <p style="color: var(--muted); margin-top: 10px; max-width: 400px; margin-left: auto; margin-right: auto;">
            Sua jornada inteligente para evolução diária. Comece agora a monitorar seus hábitos e ganhar recompensas.
        </p>
        
        <div id="authCheck" style="margin-top: 30px;">
            <!-- Dinâmico -->
        </div>
    </div>

    <div class="grid" style="margin-top: 20px;">
        <div class="card">
            <h3>Assista e Ganhe</h3>
            <p style="font-size: 13px; color: var(--muted); margin: 10px 0;">Ganhe 50 moedas assistindo um anúncio premiado.</p>
            <button class="btn-primary" onclick="watchVideo()">Assistir Vídeo 📺</button>
        </div>
        <div class="card">
            <h3>Evolução</h3>
            <p style="font-size: 13px; color: var(--muted); margin: 10px 0;">Acompanhe seu progresso do nível 1 ao 50.</p>
            <button class="btn-ghost" onclick="parent.navigate('dashboard.html')">Ver Painel</button>
        </div>
    </div>

    <script>
        function updateUI() {
            const state = parent.appState;
            const authDiv = document.getElementById('authCheck');
            
            if (state.profile.email) {
                authDiv.innerHTML = `
                    <p style="font-weight: 700;">Olá, ${state.profile.name || state.profile.email}!</p>
                    <button class="btn-primary" style="margin-top:10px;" onclick="parent.navigate('dashboard.html')">Meu Dashboard</button>
                `;
            } else {
                authDiv.innerHTML = `
                    <button class="btn-primary" onclick="parent.navigate('auth.html')">Criar Conta / Entrar</button>
                `;
            }
        }

        function watchVideo() {
            alert("Simulando Vídeo Premiado AdMob...");
            parent.addXP(10);
            parent.appState.user.coins = (parent.appState.user.coins || 0) + 50;
            parent.toast("+50 Moedas e +10 XP!");
            updateUI();
        }

        // Aguarda o state estar pronto no parent
        const checkReady = setInterval(() => {
            if (parent && parent.appState && parent.appState.isLoaded) {
                updateUI();
                clearInterval(checkReady);
            }
        }, 100);
        
        window.updateUI = updateUI;
    </script>
</body>
</html>

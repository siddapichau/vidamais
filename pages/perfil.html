<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="../css/style.css">
<script>const th=parent.document.documentElement.getAttribute('data-theme'); if(th) document.documentElement.setAttribute('data-theme',th);</script>
<style>body{padding:20px; max-width:900px; margin:0 auto;}.theme-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:10px;margin-top:12px}.theme-item{background:var(--card);border:2px solid var(--border);border-radius:14px;padding:14px;text-align:center;cursor:pointer;transition:.2s}.theme-item.active{border-color:var(--primary);background:var(--bg-2)}.theme-item:hover{transform:translateY(-2px)} .theme-item.premium{position:relative;overflow:hidden}.theme-item.premium::after{content:'💎';position:absolute;top:6px;right:6px;font-size:10px}</style>
</head>
<body>
<h2 style="font-size:26px;font-weight:800">Perfil e Configurações</h2>
<p class="muted text-sm">Seus dados ficam seguros no Firebase, vinculados à sua conta.</p>

<div class="card" style="margin-top:16px">
  <div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap;margin-bottom:16px">
    <div id="avatarPreview" style="width:72px;height:72px;border-radius:50%;background:var(--primary);display:grid;place-items:center;color:white;font-weight:800;font-size:28px;overflow:hidden;border:3px solid var(--border)">?</div>
    <div><b id="profileName">Usuário</b><p id="profileEmail" class="muted text-sm"></p><div style="display:flex;gap:6px;margin-top:6px"><span class="badge badge-free" id="profileLevel">Nv 1</span><span class="badge badge-free" id="profileXP">0 XP</span></div></div>
  </div>
  <div class="grid-2">
    <div class="input-group"><label>Nome</label><input id="p_firstName" class="input" placeholder="Ex: Wesley"></div>
    <div class="input-group"><label>Sobrenome</label><input id="p_lastName" class="input" placeholder="Ex: Studio"></div>
  </div>
  <div class="grid-2">
    <div class="input-group"><label>Telefone / WhatsApp</label><input id="p_phone" class="input" placeholder="(11) 99999-9999"></div>
    <div class="input-group"><label>Endereço / Cidade</label><input id="p_address" class="input" placeholder="São Paulo - SP"></div>
  </div>
  <div class="input-group"><label>Foto URL (opcional)</label><input id="p_photo" class="input" placeholder="https://..."></div>
  <div class="input-group">
    <label>Avatar (emoji) — alternativa à foto</label>
    <div id="avatarGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(40px,1fr));gap:6px;margin-top:6px"></div>
  </div>
  <button class="btn-primary" onclick="saveProfile()">Salvar perfil +20 XP</button>
</div>

<div class="card" style="margin-top:16px">
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px"><div><b>Temas da Interface</b><p class="muted text-xs">💎 Premium = 500 moedas, ganhe na Home assistindo vídeos.</p></div><div class="badge badge-free">🪙 <span id="coinCount">0</span> moedas</div></div>
  <div class="theme-grid" id="themeGrid"></div>
  <div style="display:flex;gap:8px;margin-top:14px"><button class="btn-ghost btn-sm" onclick="parent.appToggleTheme()">Alternar claro/escuro 🌓</button><button class="btn-ghost btn-sm" onclick="parent.navigate('home.html')">Ganhar moedas 📺</button></div>
</div>

<div class="card" style="margin-top:16px">
  <b>Conta</b>
  <div style="display:grid;gap:8px;margin-top:12px">
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-2);border-radius:12px"><span class="text-sm">E-mail</span><span id="accountEmail" class="font-bold text-sm">-</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-2);border-radius:12px"><span class="text-sm">Premium</span><span id="accountPremium" class="font-bold text-sm">-</span></div>
    <div style="display:flex;justify-content:space-between;align-items:center;padding:10px;background:var(--bg-2);border-radius:12px"><span class="text-sm">Moeda padrão</span><select id="currencySel" class="input" style="width:100px;height:32px" onchange="changeCurrency(this.value)"><option value="BRL">BRL</option><option value="USD">USD</option><option value="EUR">EUR</option></select></div>
  </div>
  <button class="btn" style="width:100%;margin-top:14px;color:var(--rose);border-color:var(--rose);background:transparent" onclick="parent.logout()">Sair da conta 🚪</button>
</div>

<script>
function getState(){ return parent.appState||{profile:{}, user:{xp:0,level:1,coins:0,premium:false}, settings:{currency:'BRL', theme:'default-light'}}; }

let selectedAvatar = '';
function renderAvatarGrid(current){
  selectedAvatar = current || '';
  const grid = document.getElementById('avatarGrid');
  if(!grid) return;
  const emojis = (parent.avatarEmojis && parent.avatarEmojis.length) ? parent.avatarEmojis : ['🦊','🐱','🐶','🦁','🐯','🐼'];
  grid.innerHTML = emojis.map((e,i)=>{
    const active = (e===selectedAvatar) ? 'border-color:var(--primary);background:var(--bg-2);transform:scale(1.08)' : '';
    return `<div onclick="selectAvatar(${i})" title="${e}" style="aspect-ratio:1;display:grid;place-items:center;font-size:20px;border:2px solid var(--border);border-radius:10px;cursor:pointer;transition:.15s;${active}">${e}</div>`;
  }).join('');
}
function selectAvatar(i){
  const emojis = (parent.avatarEmojis && parent.avatarEmojis.length) ? parent.avatarEmojis : [];
  const e = emojis[i];
  if(!e) return;
  selectedAvatar = (selectedAvatar===e) ? '' : e;
  const av=document.getElementById('avatarPreview');
  if(parent.fillAvatar) parent.fillAvatar(av, {...(getState().profile||{}), avatar: selectedAvatar});
  renderAvatarGrid(selectedAvatar);
}

function updateUI(){
  const state=getState();
  const t = parent.themes||{};
  document.getElementById('p_firstName').value = state.profile.firstName||'';
  document.getElementById('p_lastName').value = state.profile.lastName||'';
  document.getElementById('p_phone').value = state.profile.phone||'';
  document.getElementById('p_address').value = state.profile.address||'';
  document.getElementById('p_photo').value = state.profile.photo||'';
  document.getElementById('coinCount').textContent = state.user.coins||0;
  document.getElementById('profileName').textContent = state.profile.name || state.profile.firstName || state.profile.email || 'Usuário';
  document.getElementById('profileEmail').textContent = state.profile.email||'';
  document.getElementById('accountEmail').textContent = state.profile.email||'-';
  document.getElementById('accountPremium').textContent = state.user.premium ? '💎 Premium ativo' : 'Free';
  document.getElementById('profileXP').textContent = (state.user.xp||0)+' XP';
  document.getElementById('profileLevel').textContent = 'Nv '+(state.user.level||1);
  document.getElementById('currencySel').value = state.settings.currency||'BRL';

  const av=document.getElementById('avatarPreview');
  if(parent.fillAvatar){ parent.fillAvatar(av, state.profile||{}); }
  else if(state.profile.photo){ av.innerHTML=`<img src="${state.profile.photo}" style="width:100%;height:100%;object-fit:cover">`; }
  else { const ch=(state.profile.firstName||state.profile.name||state.profile.email||'?')[0].toUpperCase(); av.textContent=ch; }
  renderAvatarGrid(state.profile.avatar);

  const grid=document.getElementById('themeGrid');
  grid.innerHTML='';
  Object.keys(t).forEach(key=>{
    const isActive = (state.settings.theme||'').startsWith(key);
    const def = t[key];
    const div=document.createElement('div');
    div.className=`theme-item ${isActive?'active':''} ${def.premium?'premium':''}`;
    div.innerHTML=`<div style="font-size:22px">${def.icon||'🎨'}</div><div style="font-weight:800;font-size:12px;margin-top:6px">${def.label}</div><div style="font-size:10px;margin-top:4px" class="muted">${def.premium?'💎 500 🪙':'Grátis'}</div>`;
    div.onclick=()=>{ parent.appSelectTheme(key); setTimeout(updateUI,200); };
    grid.appendChild(div);
  });
}

async function saveProfile(){
  const data={
    firstName: document.getElementById('p_firstName').value.trim(),
    lastName: document.getElementById('p_lastName').value.trim(),
    phone: document.getElementById('p_phone').value.trim(),
    address: document.getElementById('p_address').value.trim(),
    photo: document.getElementById('p_photo').value.trim(),
    avatar: selectedAvatar || ''
  };
  data.name = `${data.firstName} ${data.lastName}`.trim();
  await parent.updateProfile(data);
  parent.addXP(20);
  parent.toast&&parent.toast('Perfil salvo! +20 XP');
  updateUI();
}
window.saveProfile=saveProfile;
function changeCurrency(cur){ parent.appChangeCurrency(cur); }

const ci=setInterval(()=>{ if(parent&&parent.appState&&parent.appState.isLoaded){ updateUI(); clearInterval(ci);} },100);
setTimeout(updateUI,800);
window.updateUI=updateUI;
</script>
</body>
</html>

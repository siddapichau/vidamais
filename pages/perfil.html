<div class="top-actions" style="margin-bottom: 16px;">
  <h2>Meu Perfil</h2>
  <p style="color:var(--muted); font-size: 13px;">Gerencie suas configurações e preferências.</p>
</div>
<div class="grid grid-2">
  <div class="card">
    <b>Dados Pessoais</b>
    <div style="display:grid;gap:8px;margin-top:12px">
      <div class="row"><input id="profileFirstName" class="input" placeholder="Nome"><input id="profileLastName" class="input" placeholder="Sobrenome"></div>
      <div class="row"><select id="profileCurrency" class="input"><option value="BRL">BRL</option><option value="USD">USD</option><option value="EUR">EUR</option></select><select id="profileTheme" class="input"><option value="light">Claro</option><option value="dark">Escuro</option></select></div>
      <button class="btn btn-primary btn-sm" onclick="alert('Salvo com sucesso!')">Salvar perfil</button>
    </div>
  </div>
  <div class="card" style="background:linear-gradient(135deg,var(--primary),var(--violet));color:white;border:none">
    <b>Status da Conta</b>
    <div style="font-size:22px;font-weight:800;margin-top:8px">Plano Atual: Free</div>
    <button class="btn btn-white btn-sm" style="margin-top:12px;width:100%">Explorar Premium</button>
  </div>
</div>

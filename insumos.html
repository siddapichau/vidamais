<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>body { padding: 20px; }</style>
</head>
<body>
    <h2>Insumos e Recursos</h2>
    <div class="card" style="margin-top:20px">
        <p>Aqui você poderá gerenciar seus itens, moedas e outros recursos do sistema.</p>
        <div class="grid" style="margin-top:20px">
            <div class="card">
                <h3>Moedas</h3>
                <div style="font-size: 24px; font-weight: 800; color: #D4AF37;">🪙 <span id="coins">0</span></div>
            </div>
            <div class="card">
                <h3>AI Tokens</h3>
                <div style="font-size: 24px; font-weight: 800; color: var(--primary);">⚡ <span id="tokens">10</span></div>
            </div>
        </div>
    </div>
    <script type="module">
        import { state } from './core.js';
        document.getElementById('coins').textContent = state.user.coins || 0;
    </script>
</body>
</html>

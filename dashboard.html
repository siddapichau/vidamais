<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>body { padding: 20px; }</style>
</head>
<body>
    <div class="topbar">
        <h2>Seu Progresso</h2>
        <div id="coinCount">🪙 0</div>
    </div>

    <div class="card" style="margin-bottom: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <b id="lvlName">Nível 1 - Iniciante</b>
            <span id="xpValue">0 / 1000 XP</span>
        </div>
        <div class="xp-container">
            <div class="xp-bar" id="xpBar" style="width: 0%"></div>
        </div>
        <p style="font-size: 12px; color: var(--muted);" id="lvlDesc">Continue suas atividades para subir de nível!</p>
    </div>

    <div class="grid">
        <div class="card">
            <h3>Atividade Física</h3>
            <p>Meta: 30min hoje</p>
            <button class="btn-primary" style="margin-top:10px" onclick="completeActivity(50)">Concluir (+50 XP)</button>
        </div>
        <div class="card">
            <h3>Estudos AI</h3>
            <p>Meta: 1h por dia</p>
            <button class="btn-primary" style="margin-top:10px" onclick="completeActivity(100)">Concluir (+100 XP)</button>
        </div>
    </div>

    <script type="module">
        import { state, getLevelData, addXP } from './core.js';
        
        function updateUI() {
            const lvl = getLevelData(state.user.xp || 0);
            document.getElementById('lvlName').textContent = `${lvl.current.name} (Nível ${lvl.current.level})`;
            document.getElementById('xpValue').textContent = `${state.user.xp} / ${lvl.next.xp} XP`;
            document.getElementById('xpBar').style.width = lvl.pct + '%';
            document.getElementById('lvlDesc').textContent = lvl.current.description || 'Continue evoluindo!';
            document.getElementById('coinCount').textContent = `🪙 ${state.user.coins || 0}`;
        }

        window.completeActivity = (xp) => {
            addXP(xp);
            updateUI();
            if(parent.window.toast) parent.window.toast(`+${xp} XP de evolução!`);
        }

        window.updateUI = updateUI;
        updateUI();
    </script>
</body>
</html>

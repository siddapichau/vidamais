<!DOCTYPE html>
<html lang="pt-br" data-theme="default-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vida+ AI — Evolução Inteligente</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&family=Fraunces:wght@700&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/a076d15399.js" crossorigin="anonymous"></script>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background: var(--bg); }
        .app-container { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        
        /* Desktop Menu (Top) */
        .top-nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 24px; height: 70px; background: var(--card);
            border-bottom: 1px solid var(--border); z-index: 1000;
        }
        .nav-links { display: flex; gap: 20px; }
        .nav-links a { 
            text-decoration: none; color: var(--muted); font-weight: 600; 
            padding: 8px 12px; border-radius: 8px; transition: .2s;
        }
        .nav-links a.active { color: var(--primary); background: var(--bg-2); }

        /* Content Iframe */
        #contentFrame { flex: 1; border: none; width: 100%; height: 100%; }

        /* Mobile Menu (Side) */
        .mobile-sidebar {
            position: fixed; top: 0; left: -280px; width: 280px; height: 100%;
            background: var(--card); z-index: 2000; transition: .3s;
            box-shadow: 10px 0 30px rgba(0,0,0,0.1); padding: 20px;
        }
        .mobile-sidebar.open { left: 0; }
        .overlay-bg {
            position: fixed; inset: 0; background: rgba(0,0,0,0.5);
            display: none; z-index: 1500;
        }
        .overlay-bg.open { display: block; }

        @media (max-width: 768px) {
            .top-nav .nav-links { display: none; }
            .top-nav .menu-toggle { display: block; cursor: pointer; font-size: 24px; color: var(--text); }
        }
        @media (min-width: 769px) {
            .menu-toggle { display: none; }
        }

        /* AdMob Banner Placeholder */
        #ad-banner {
            height: 50px; background: var(--bg-2); display: flex; 
            align-items: center; justify-content: center; font-size: 10px;
            color: var(--muted); border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>

<div class="app-container">
    <!-- Topbar para PC -->
    <header class="top-nav">
        <div class="brand" onclick="navigate('home.html')">
            <img src="logo.png" alt="Vida+" style="height: 32px;">
            <span class="brand-text" style="margin-left: 10px; font-weight: 800; font-size: 18px; color: var(--text);">Vida+ AI</span>
        </div>
        
        <nav class="nav-links" id="pcMenu">
            <!-- Carregado via Firebase -->
        </nav>

        <div class="top-actions">
            <button class="btn-ghost" onclick="appToggleTheme()" style="padding: 8px; border-radius: 50%; width: 40px; height: 40px;">🌓</button>
            <div class="menu-toggle" onclick="toggleMobileMenu()">☰</div>
        </div>
    </header>

    <iframe id="contentFrame" src="about:blank"></iframe>

    <div id="ad-banner">
        Anúncio AdMob aqui
    </div>
</div>

<!-- Mobile Sidebar -->
<div class="overlay-bg" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
<aside class="mobile-sidebar" id="mobileMenu">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <b style="font-size:20px;">Menu</b>
        <span onclick="toggleMobileMenu()" style="cursor:pointer; font-size:24px;">&times;</span>
    </div>
    <nav id="mobileMenuLinks" style="display:flex; flex-direction:column; gap:10px;">
        <!-- Carregado via Firebase -->
    </nav>
</aside>

<script type="module">
    import { initAuthListener, db } from './firebase.js';
    import { ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

    window.toggleMobileMenu = () => {
        document.getElementById('mobileMenu').classList.toggle('open');
        document.getElementById('mobileOverlay').classList.toggle('open');
    }

    window.navigate = (page) => {
        const frame = document.getElementById('contentFrame');
        frame.src = page;
        // Update URL without reload
        const newUrl = window.location.pathname + '?page=' + page;
        window.history.pushState({path:newUrl},'',newUrl);
        
        // Close mobile menu
        document.getElementById('mobileMenu').classList.remove('open');
        document.getElementById('mobileOverlay').classList.remove('open');
        
        // Update active links
        updateActiveLinks(page);
    }

    function updateActiveLinks(page) {
        document.querySelectorAll('nav a').forEach(a => {
            a.classList.toggle('active', a.getAttribute('onclick')?.includes(page));
        });
    }

    // Load Menu from Firebase
    const menuRef = ref(db, 'admin/menu');
    onValue(menuRef, (snapshot) => {
        const menuData = snapshot.val() || [
            { id: 1, label: 'Home', page: 'home.html', icon: '🏠' },
            { id: 2, label: 'Dashboard', page: 'dashboard.html', icon: '📊' },
            { id: 3, label: 'Insumos', page: 'insumos.html', icon: '📦' },
            { id: 4, label: 'Perfil', page: 'perfil.html', icon: '👤' }
        ];
        
        // Sort by order if available
        const sorted = menuData.sort((a,b) => (a.order || 0) - (b.order || 0));

        const pcMenu = document.getElementById('pcMenu');
        const mobileMenu = document.getElementById('mobileMenuLinks');
        
        pcMenu.innerHTML = '';
        mobileMenu.innerHTML = '';

        sorted.forEach(item => {
            const pcA = document.createElement('a');
            pcA.href = "#";
            pcA.innerHTML = `${item.label}`;
            pcA.onclick = (e) => { e.preventDefault(); navigate(item.page); };
            pcMenu.appendChild(pcA);

            const mobA = document.createElement('a');
            mobA.href = "#";
            mobA.style.display = "flex";
            mobA.style.alignItems = "center";
            mobA.style.gap = "15px";
            mobA.style.padding = "12px";
            mobA.style.borderRadius = "10px";
            mobA.style.textDecoration = "none";
            mobA.style.color = "var(--text)";
            mobA.style.fontWeight = "600";
            mobA.innerHTML = `<span>${item.icon || '•'}</span> ${item.label}`;
            mobA.onclick = (e) => { e.preventDefault(); navigate(item.page); };
            mobileMenu.appendChild(mobA);
        });

        // Initial Navigation
        const params = new URLSearchParams(window.location.search);
        const startPage = params.get('page') || 'home.html';
        navigate(startPage);
    });

    // Handle Auth and Redirect if needed
    initAuthListener((user) => {
        if (!user && window.location.search.includes('page=dashboard.html')) {
            // navigate('home.html'); // Opcional: forçar home se deslogado
        }
    });

</script>
</body>
</html>

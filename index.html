<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vida+ AI — Evolução Diária</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
<style>
.auth-tabs{display:flex;gap:6px;background:var(--bg-2);padding:4px;border-radius:12px;margin-top:12px}
.auth-tabs button{flex:1;height:36px;border-radius:9px;border:none;background:transparent;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted)}
.auth-tabs button.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid var(--border)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand">
      <div class="logo"><img src="assets/logo.png" onerror="this.style.display='none'"><span>V+</span></div>
      <div class="brand-text"><b>Vida+ AI</b></div>
    </div>
    <nav class="nav" id="nav">
      <button class="active" data-page="home" onclick="appLoadPage('home')"><span class="ico">⌂</span> Home</button>
      <button data-page="dashboard" onclick="appLoadPage('dashboard')"><span class="ico">◧</span> Dashboard</button>
      <button data-page="financeiro" onclick="appLoadPage('financeiro')"><span class="ico">₿</span> Financeiro</button>
      <button data-page="habitos" onclick="appLoadPage('habitos')"><span class="ico">◍</span> Hábitos</button>
      <button data-page="humor" onclick="appLoadPage('humor')"><span class="ico">☺</span> Humor</button>
      <button data-page="metas" onclick="appLoadPage('metas')"><span class="ico">◎</span> Metas</button>
      <button data-page="relatorios" onclick="appLoadPage('relatorios')"><span class="ico">✦</span> IA & Insights</button>
      <button data-page="conquistas" onclick="appLoadPage('conquistas')"><span class="ico">★</span> Conquistas</button>
      <button data-page="perfil" onclick="appLoadPage('perfil')"><span class="ico">👤</span> Perfil</button>
    </nav>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search-wrap"><span class="sico">⌕</span><input id="globalSearch" placeholder="Buscar no Vida+ AI..."></div>
      <div class="top-actions">
        <button class="btn btn-ghost btn-sm" onclick="appToggleTheme()">◐</button>
        <div class="avatar" id="avatar" onclick="appAvatarClick()">?</div>
        <button class="btn btn-primary btn-sm" id="topLoginBtn" onclick="appOpenAuthModal()">Entrar</button>
        <button class="btn btn-ghost btn-sm" id="btnLogout" onclick="appHandleLogout()" style="display:none;">Sair</button>
      </div>
    </div>

    <!-- HOME ISOLADA (Fim do conflito de injeção dupla) -->
    <div id="homeView" style="display: block;">
      <div id="home-welcome" style="max-width:900px;margin:0 auto;text-align:center;padding:20px 10px">
        <div style="width:80px;height:80px;margin:0 auto 16px;border-radius:20px;background:conic-gradient(from 210deg at 50% 50%, #123C7A, #6366F1, #06B6D4, #10B981, #123C7A);display:grid;place-items:center;box-shadow:0 12px 30px rgba(18,60,122,.25)"><span style="font-size:32px; font-weight:800; color:white;">V+</span></div>
        <h1 class="display" style="font-size:42px;line-height:1;letter-spacing:-.04em">Evolução diária<br>inteligente.</h1>
        <p style="color:var(--muted);font-size:15px;margin-top:14px;line-height:1.5;max-width:600px;margin-left:auto;margin-right:auto">Una finanças, hábitos e metas. Uma plataforma que ajuda você a tomar decisões melhores, encontrar padrões invisíveis e subir de nível na vida real.</p>
        <div style="display:flex;gap:10px;justify-content:center;margin-top:24px">
          <button class="btn btn-primary" style="height:50px;padding:0 28px;font-size:15px" onclick="appOpenAuthModal()">🚀 Acessar o App Gratuitamente</button>
        </div>
      </div>
    </div>

    <div id="pageContainer" style="display:none"></div>
  </main>
</div>

<!-- Modal Auth -->
<div class="overlay" id="overlayAuth">
  <div class="modal auth-modal">
    <div style="text-align:center">
      <h2 id="authTitle">Acessar Vida+ AI</h2>
      <div class="auth-tabs">
        <button class="active" id="tabLogin" onclick="appSwitchAuthMode('login')">Entrar</button>
        <button id="tabSignup" onclick="appSwitchAuthMode('signup')">Criar conta</button>
      </div>
    </div>
    <div style="margin-top:16px;">
      <div id="authLoginView" style="display:grid;gap:10px">
        <input id="authEmail" class="input" type="email" placeholder="seu@email.com">
        <input id="authPass" class="input" type="password" placeholder="Sua senha">
        <button class="btn btn-primary" onclick="appHandleLogin()" style="height:44px">Entrar no Sistema</button>
      </div>
      <div id="authSignupView" style="display:none;gap:10px">
        <div class="row"><input id="authFirstName" class="input" placeholder="Nome"><input id="authLastName" class="input" placeholder="Sobrenome"></div>
        <input id="authEmailSignup" class="input" type="email" placeholder="seu@email.com">
        <input id="authPassSignup" class="input" type="password" placeholder="Senha mín 6 caracteres">
        <button class="btn btn-primary" onclick="appHandleSignup()" style="height:44px">Criar Minha Conta</button>
      </div>
      <button class="btn btn-ghost btn-sm" onclick="appCloseModal('overlayAuth')" style="width:100%; margin-top:10px;">Fechar</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toasts"></div>
<script type="module" src="js/app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vida+ AI — Home</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<style>
#pageFrame{width:100%;border:none;display:block;min-height:70vh;background:transparent}
#pageFrameContainer{display:block}
#homeEssential{display:none}
.google-btn{width:100%;height:46px;border-radius:12px;border:1px solid var(--border);background:white;color:var(--text);font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer}
.auth-tabs{display:flex;gap:6px;background:var(--bg-2);padding:4px;border-radius:12px;margin-top:12px}
.auth-tabs button{flex:1;height:36px;border-radius:9px;border:none;background:transparent;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted)}
.auth-tabs button.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid var(--border)}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted-2);font-size:11px;font-weight:700;letter-spacing:.12em;margin:8px 0}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo has-img"><img src="assets/logo.png" alt="" onerror="this.style.display='none'"><span>V+</span></div><div class="brand-text"><b>Vida+ AI</b><i>Home</i></div></div>
    <nav class="nav" id="nav">
      <button class="active" data-page="home" onclick="navigate('home')"><span class="ico">⌂</span> Home</button>
      <button data-page="dashboard" onclick="navigate('dashboard')"><span class="ico">◧</span> Dashboard</button>
      <button data-page="financeiro" onclick="navigate('financeiro')"><span class="ico">₿</span> Financeiro</button>
      <button data-page="habitos" onclick="navigate('habitos')"><span class="ico">◍</span> Hábitos</button>
      <button data-page="humor" onclick="navigate('humor')"><span class="ico">☺</span> Humor</button>
      <button data-page="metas" onclick="navigate('metas')"><span class="ico">◎</span> Metas</button>
      <button data-page="relatorios" onclick="navigate('relatorios')"><span class="ico">✦</span> IA</button>
      <button data-page="conquistas" onclick="navigate('conquistas')"><span class="ico">★</span> Conquistas</button>
      <button data-page="perfil" onclick="navigate('perfil')"><span class="ico">👤</span> Perfil</button>
    </nav>
    <div class="sidebar-foot">
      <span class="premium-tag" id="premiumTag">Vida+ AI</span>
      <h4 id="sidebarName">Bem-vindo</h4>
      <p id="userEmailChip" style="font-size:11px;opacity:.9;word-break:break-all">Visitante • Faça login</p>
      <div id="syncStatus" style="font-size:10px;margin-top:8px;opacity:.8">● Pronto</div>
      <button class="btn btn-white btn-sm" style="margin-top:10px;width:100%" onclick="openLogin()">Entrar / Criar conta</button>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px;background:rgba(255,255,255,.12);border:none;color:white;width:100%;display:none" id="btnLogout" onclick="doLogout()">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search-wrap"><span class="sico">⌕</span><input id="globalSearch" placeholder="Buscar... (só funciona logado)" onkeydown="if(event.key==='Enter'){ navigate('financeiro'); }"></div>
      <div class="top-actions">
        <span class="chip"><span class="dot"></span> <span id="streakLabel">Visitante</span></span>
        <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">◐</button>
        <div class="avatar" id="avatar" onclick="openLogin()">?</div>
        <button class="btn btn-primary btn-sm" onclick="openLogin()">Entrar</button>
      </div>
    </div>

    <div id="pageFrameContainer">
      <iframe id="pageFrame" src="pages/home.html?embedded=1" loading="lazy"></iframe>
    </div>
  </main>
</div>

<!-- LOGIN SÓ APARECE QUANDO CLICAR EM ACESSAR/LOGAR -->
<div class="overlay" id="overlayAuth" style="z-index:150">
  <div class="modal" style="max-width:400px">
    <div style="padding:22px 22px 0;text-align:center">
      <img src="assets/logo.png" style="width:56px;height:56px;border-radius:14px;margin:0 auto 10px;display:block;object-fit:cover" onerror="this.style.display='none'">
      <h2 id="authTitle" style="font-size:22px">Entrar no Vida+ AI</h2>
      <p style="color:var(--muted);font-size:12px;margin-top:6px">Login será pedido só agora que clicou em Acessar</p>
      <div class="auth-tabs">
        <button class="active" id="tabLogin" onclick="switchAuth('login')">Entrar</button>
        <button id="tabSignup" onclick="switchAuth('signup')">Criar conta</button>
      </div>
    </div>
    <div style="padding:16px 20px;display:grid;gap:10px">
      <div id="loginView" style="display:grid;gap:10px">
        <button class="google-btn" id="btnGoogle" onclick="loginGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px"> Continuar com Google</button>
        <div class="divider">OU E-MAIL</div>
        <input id="email" class="input" type="email" placeholder="seu@email.com">
        <input id="pass" class="input" type="password" placeholder="Sua senha">
        <button class="btn btn-primary" id="btnLogin" onclick="loginEmail()" style="height:44px">Entrar</button>
        <span class="link" style="text-align:center;display:block;font-size:12px" onclick="resetPass()">Esqueci senha</span>
      </div>
      <div id="signupView" style="display:none;gap:10px">
        <button class="google-btn" onclick="loginGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px"> Cadastrar com Google</button>
        <div class="divider">OU</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="firstName" class="input" placeholder="Nome"><input id="lastName" class="input" placeholder="Sobrenome"></div>
        <input id="emailSignup" class="input" type="email" placeholder="seu@email.com">
        <input id="passSignup" class="input" type="password" placeholder="Senha mín 6">
        <button class="btn btn-primary" id="btnSignup" onclick="signupEmail()" style="height:44px">Criar conta</button>
      </div>
      <div id="authError" style="display:none;padding:10px;border-radius:10px;background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;font-size:12px"></div>
      <button class="btn btn-ghost btn-sm" onclick="closeModal('overlayAuth')" style="width:100%">Continuar sem login (ver Home)</button>
    </div>
  </div>
</div>

<div class="toast-stack" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, sendPasswordResetEmail, updateProfile, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const cfg={
  apiKey:"AIzaSyB3PEDD9LwVeqSVYFkYvfl7GiXARJgLV6Q",
  authDomain:"vidamaisai.firebaseapp.com",
  databaseURL:"https://vidamaisai-default-rtdb.firebaseio.com",
  projectId:"vidamaisai",
  storageBucket:"vidamaisai.firebasestorage.app",
  messagingSenderId:"685977764265",
  appId:"1:685977764265:web:aab35e2d621856a3e6c4b8"
};
const ADMIN_EMAIL="wesleystudio@gmail.com";
const app=initializeApp(cfg);
const auth=getAuth(app);
const db=getDatabase(app);
setPersistence(auth,browserLocalPersistence).catch(()=>{});
const provider=new GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});

const $=id=>document.getElementById(id);
function toast(msg,ico='✦'){
  const s=$('toasts'); if(!s) return;
  const el=document.createElement('div'); el.className='toast'; el.innerHTML=`<div class="t-ico">${ico}</div><div>${msg}</div>`;
  s.appendChild(el); setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); },4000);
}
function showErr(m){ const e=$('authError'); if(!e) return; if(!m){ e.style.display='none'; return; } e.style.display='block'; e.textContent=m; toast(m,'⚠️'); }

// Verifica redirect Google (celular)
getRedirectResult(auth).then(r=>{ if(r&&r.user){ toast('Google OK: '+r.user.email,'✓'); } }).catch(e=>{ console.warn(e); });

let currentUser=null;
onAuthStateChanged(auth, async (user)=>{
  currentUser=user;
  if(user){
    console.log('Logado', user.email);
    $('overlayAuth').classList.remove('open');
    $('userEmailChip').textContent=user.email;
    $('sidebarName').textContent='Olá, '+(user.displayName?.split(' ')[0]||user.email.split('@')[0]);
    $('avatar').textContent=(user.displayName||user.email||'U').charAt(0).toUpperCase();
    $('btnLogout').style.display='block';
    // garante dados RTDB sem travar
    try{
      const snap=await get(ref(db, `vidaplus/users/${user.uid}`));
      if(!snap.exists()){
        const isAdmin=user.email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
        const fullName=user.displayName||user.email.split('@')[0];
        const parts=fullName.split(' ');
        await set(ref(db, `vidaplus/users/${user.uid}`), {
          profile:{name:fullName, firstName:parts[0]||fullName, lastName:parts.slice(1).join(' ')||'', email:user.email, phone:'', photo:user.photoURL||'', currency:'BRL', premium:isAdmin, isAdmin:isAdmin, createdAt:new Date().toISOString()},
          user:{name:fullName, xp:0, level:1, joined:new Date().toISOString(), premium:isAdmin},
          app:{streak:0,premium:isAdmin,theme:'light',uid:user.uid},
          settings:{theme:'light',currency:'BRL'},
          transactions:[], habits:[], moods:[], goals:[]
        });
      }
    }catch(e){ console.warn('RTDB ensure', e.code, e.message); if(e.code==='PERMISSION_DENIED') toast('RTDB bloqueado, verifique Rules','⚠️'); }
    // Se estava na home, vai pro dashboard após login
    const params=new URLSearchParams(location.search);
    const page=params.get('page')||'dashboard';
    if(page!=='home') navigate(page); else navigate('dashboard');
  }else{
    console.log('Deslogado, mostrando home sem exigir login');
    $('userEmailChip').textContent='Visitante • Faça login';
    $('sidebarName').textContent='Bem-vindo';
    $('avatar').textContent='?';
    $('btnLogout').style.display='none';
    // Não abre login automaticamente, só quando clicar em Acessar
    // Mostra home de boas vindas
    navigate('home');
  }
});

window.navigate=(page)=>{
  let n=(page||'home').replace('.html','').toLowerCase();
  const allowed=['home','dashboard','financeiro','habitos','humor','metas','relatorios','conquistas','perfil'];
  if(!allowed.includes(n)) n='home';
  document.querySelectorAll('.nav button').forEach(b=>{ b.classList.toggle('active', b.dataset.page===n); });
  try{ const u=new URL(location.href); u.searchParams.set('page', n); history.pushState({},'',u); }catch{}
  const frame=$('pageFrame');
  // Páginas protegidas: se não logado e tenta acessar diferente de home, pede login
  const protectedPages=['dashboard','financeiro','habitos','humor','metas','relatorios','conquistas','perfil'];
  if(protectedPages.includes(n) && !currentUser){
    // Mostra login quando clica em Acessar
    openLogin();
    toast('Faça login para acessar '+n,'🔒');
    return;
  }
  frame.src=`pages/${n}.html?embedded=1&_=${Date.now()}`;
  frame.onload=()=>{
    try{
      const doc=frame.contentDocument||frame.contentWindow.document;
      if(doc){ frame.style.height=(Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight)+40)+'px'; }
    }catch{}
  };
};
window.addEventListener('message', (e)=>{
  if(e.data && e.data.type==='resize' && e.data.height){
    const frame=$('pageFrame');
    if(frame) frame.style.height=(e.data.height+40)+'px';
  }
  if(e.data && e.data.type==='navigate'){
    navigate(e.data.page);
  }
  if(e.data && e.data.type==='openLogin'){
    openLogin();
  }
});
window.addEventListener('popstate', ()=>{ const p=new URLSearchParams(location.search).get('page')||'home'; navigate(p); });

window.openLogin=()=>{ $('overlayAuth').classList.add('open'); };
window.closeModal=(id)=>{ const el=document.getElementById(id); if(el) el.classList.remove('open'); };
window.switchAuth=(mode)=>{
  const lv=$('loginView'), sv=$('signupView'), tl=$('tabLogin'), ts=$('tabSignup');
  if(mode==='signup'){ lv.style.display='none'; sv.style.display='grid'; tl.classList.remove('active'); ts.classList.add('active'); }
  else{ lv.style.display='grid'; sv.style.display='none'; tl.classList.add('active'); ts.classList.remove('active'); }
  showErr('');
};
let busy=false;
window.loginEmail=async()=>{
  if(busy) return; busy=true;
  const email=$('email').value.trim(); const pass=$('pass').value;
  const btn=$('btnLogin');
  if(!email||!pass){ showErr('Digite e-mail e senha'); busy=false; return; }
  const orig=btn.textContent;
  try{ btn.textContent='Entrando...'; btn.disabled=true; showErr(''); await signInWithEmailAndPassword(auth, email, pass); }
  catch(e){ let m=e.message; if(e.code==='auth/invalid-credential') m='E-mail ou senha incorretos'; if(e.code==='auth/unauthorized-domain') m=`Domínio ${location.hostname} não autorizado`; showErr(m+' ('+e.code+')'); }
  finally{ busy=false; btn.textContent=orig; btn.disabled=false; }
};
window.signupEmail=async()=>{
  if(busy) return; busy=true;
  const fn=$('firstName').value.trim(); const ln=$('lastName').value.trim();
  const email=$('emailSignup').value.trim(); const pass=$('passSignup').value;
  const btn=$('btnSignup');
  if(!fn){ showErr('Nome obrigatório'); busy=false; return; }
  if(!email){ showErr('E-mail obrigatório'); busy=false; return; }
  if(!pass||pass.length<6){ showErr('Senha mín 6'); busy=false; return; }
  const orig=btn.textContent;
  try{ btn.textContent='Criando...'; btn.disabled=true; showErr(''); const cred=await createUserWithEmailAndPassword(auth, email, pass); const fullName=`${fn} ${ln}`.trim(); if(fullName) await updateProfile(cred.user, {displayName:fullName}); }
  catch(e){ let m=e.message; if(e.code==='auth/email-already-in-use') m='E-mail já existe, faça login'; showErr(m+' ('+e.code+')'); }
  finally{ busy=false; btn.textContent=orig; btn.disabled=false; }
};
window.loginGoogle=async()=>{
  if(busy) return; busy=true;
  const btn=$('btnGoogle');
  const orig=btn.textContent;
  try{ btn.textContent='Conectando Google...'; btn.disabled=true; showErr(''); try{ await signInWithPopup(auth, provider); }catch(e){ if(e.code==='auth/popup-blocked' || /mobile|android|iphone/i.test(navigator.userAgent)){ await signInWithRedirect(auth, provider); return; } throw e; } }
  catch(e){ let m=e.message; if(e.code==='auth/unauthorized-domain') m=`Domínio ${location.hostname} não autorizado`; showErr(m+' ('+e.code+')'); }
  finally{ busy=false; btn.textContent=orig; btn.disabled=false; }
};
window.resetPass=async()=>{
  const email=$('email').value.trim()||$('emailSignup').value.trim();
  if(!email){ showErr('Digite e-mail'); return; }
  try{ await sendPasswordResetEmail(auth, email); showErr('E-mail enviado para '+email); toast('E-mail enviado','📧'); }catch(e){ showErr(e.message); }
};
window.doLogout=async()=>{ if(!confirm('Sair?')) return; try{ await signOut(auth); localStorage.clear(); location.href='index.html?page=home'; }catch(e){ localStorage.clear(); location.reload(); } };
window.toggleTheme=()=>{ const cur=document.documentElement.getAttribute('data-theme')||'light'; const next=cur==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme', next); localStorage.setItem('vidaplus_theme', next); };

// Inicial: carrega home de boas vindas sem exigir login, sem puxar Firebase pesado
(function(){
  const p=new URLSearchParams(location.search).get('page')||'home';
  // Não carrega dashboard direto, carrega home leve primeiro
  navigate(p);
})();
</script>
</body>
</html>

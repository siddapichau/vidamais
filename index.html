<!-- Script de fallback para garantir limpeza -->
<script>
  (function(){
    // Se houver dados locais e o uid for default_user, limpa
    try {
      const app = JSON.parse(localStorage.getItem('vidaplus_app_v5') || '{}');
      if (!app.uid || app.uid === 'default_user') {
        Object.keys(localStorage).forEach(k => {
          if (k.startsWith('vidaplus_')) localStorage.removeItem(k);
        });
        console.log('[Fallback] Dados locais limpos porque uid é default_user');
      }
    } catch(e) {}
  })();
</script>

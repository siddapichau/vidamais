<!DOCTYPE html>
<html lang="pt-br" data-theme="default-light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vida+ AI — Inteligência para sua Evolução</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        body, html { height: 100%; overflow: hidden; background: var(--bg); }
        .app-shell { display: flex; flex-direction: column; height: 100vh; width: 100vw; }
        #mainIframe { flex: 1; border: none; width: 100%; height: 100%; transition: opacity 0.3s; }
        .iframe-loading { opacity: 0; }
        
        .brand { display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .brand img { height: 35px; width: 35px; border-radius: 8px; }
        .brand-text { font-weight: 800; font-size: 20px; color: var(--text); letter-spacing: -0.5px; }

        .menu-pc { display: flex; gap: 5px; }
        .top-actions { display: flex; align-items: center; gap: 12px; }
        .btn-circle { width: 42px; height: 42px; border-radius: 50%; border: 1px solid var(--border); background: var(--card); display: grid; place-items: center; cursor: pointer; color: var(--text); }
        
        .mobile-toggle { display: none; font-size: 24px; cursor: pointer; }
        @media (max-width: 768px) {
            .mobile-toggle { display: block; }
            .menu-pc { display: none; }
        }

        #ad-bottom { height: 60px; background: var(--bg-2); border-top: 1px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 11px; color: var(--muted); }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="top-nav">
        <div class="brand" onclick="navigate('home.html')">
            <img src="logo.png" alt="Logo">
            <span class="brand-text">Vida+ AI</span>
        </div>

        <nav class="menu-pc" id="pcNav">
            <!-- Carregado via JS -->
        </nav>

        <div class="top-actions">
            <div class="btn-circle" onclick="appToggleTheme()">🌓</div>
            <div class="mobile-toggle" onclick="toggleMobileMenu()">☰</div>
        </div>
    </header>

    <iframe id="mainIframe" name="mainIframe" src="about:blank"></iframe>

    <div id="ad-bottom">Anúncio AdMob Banner</div>
</div>

<!-- Mobile Drawer -->
<div class="overlay-bg" id="mobileOverlay" onclick="toggleMobileMenu()"></div>
<aside class="mobile-sidebar" id="mobileDrawer">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:30px;">
        <span class="brand-text">Menu</span>
        <span onclick="toggleMobileMenu()" style="font-size:30px; cursor:pointer;">&times;</span>
    </div>
    <nav id="mobileNav" style="display:flex; flex-direction:column; gap:8px;"></nav>
</aside>

<!-- Scripts Principais -->
<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/core.js"></script>
<script type="module" src="js/app.js"></script>

<script type="module">
    import { db, ref, onValue } from './js/firebase.js';

    window.toggleMobileMenu = () => {
        document.getElementById('mobileDrawer').classList.toggle('open');
        document.getElementById('mobileOverlay').classList.toggle('open');
    };

    window.navigate = (page) => {
        const frame = document.getElementById('mainIframe');
        frame.classList.add('iframe-loading');
        
        // Garante que o caminho seja relativo a /pages/
        const target = page.startsWith('pages/') ? page : `pages/${page}`;
        frame.src = target;
        
        // Atualiza URL sem recarregar
        const urlParams = new URLSearchParams(window.location.search);
        urlParams.set('page', page);
        window.history.pushState({}, '', `${window.location.pathname}?${urlParams.toString()}`);

        toggleMobileMenu();
        if (window.updateActiveMenu) window.updateActiveMenu(page);
        
        setTimeout(() => frame.classList.remove('iframe-loading'), 300);
    };

    // Carregar Menu do Firebase
    onValue(ref(db, 'admin/menu'), (snapshot) => {
        const menu = snapshot.val() || [
            { label: 'Home', page: 'home.html', icon: '🏠', order: 0 },
            { label: 'Dashboard', page: 'dashboard.html', icon: '📊', order: 1 },
            { label: 'Insumos', page: 'insumos.html', icon: '📦', order: 2 },
            { label: 'Perfil', page: 'perfil.html', icon: '👤', order: 3 }
        ];

        const sorted = menu.sort((a,b) => a.order - b.order);
        const pcNav = document.getElementById('pcNav');
        const mobNav = document.getElementById('mobileNav');
        
        pcNav.innerHTML = ''; mobNav.innerHTML = '';

        sorted.forEach(item => {
            const createLink = (isMob) => {
                const a = document.createElement('a');
                a.className = 'nav-item';
                a.href = "javascript:void(0)";
                a.onclick = () => navigate(item.page);
                a.innerHTML = `<span>${item.icon || '•'}</span> <span>${item.label}</span>`;
                return a;
            };
            pcNav.appendChild(createLink(false));
            mobNav.appendChild(createLink(true));
        });

        window.updateActiveMenu = (page) => {
            document.querySelectorAll('.nav-item').forEach(a => {
                const isActive = a.getAttribute('onclick').includes(page);
                a.classList.toggle('active', isActive);
            });
        };

        // Navegação Inicial
        const params = new URLSearchParams(window.location.search);
        const initial = params.get('page') || 'home.html';
        navigate(initial);
    });

    // Detectar login e recarregar iframe se necessário
    window.onAppStateUpdate = () => {
        const frame = document.getElementById('mainIframe');
        if (frame.contentWindow && frame.contentWindow.updateUI) {
            frame.contentWindow.updateUI();
        }
    };
</script>

</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Vida+ AI — Home</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="stylesheet" href="css/style.css">
<link rel="manifest" href="manifest.json">
<style>
#pageFrame{width:100%;border:none;display:block;min-height:75vh;background:transparent}
#pageFrameContainer{display:none;animation:fade .3s ease}
#homeEssential{display:block;text-align:center;padding:60px 20px;color:var(--muted)}
.google-btn{width:100%;height:46px;border-radius:12px;border:1px solid var(--border);background:white;color:var(--text);font-weight:700;display:flex;align-items:center;justify-content:center;gap:10px;cursor:pointer}
.auth-tabs{display:flex;gap:6px;background:var(--bg-2);padding:4px;border-radius:12px;margin-top:12px}
.auth-tabs button{flex:1;height:36px;border-radius:9px;border:none;background:transparent;font-weight:700;font-size:13px;cursor:pointer;color:var(--muted)}
.auth-tabs button.active{background:var(--card);color:var(--text);box-shadow:0 2px 8px rgba(0,0,0,.08);border:1px solid var(--border)}
.divider{display:flex;align-items:center;gap:12px;color:var(--muted-2);font-size:11px;font-weight:700;letter-spacing:.12em;margin:8px 0}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--border)}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="brand"><div class="logo has-img"><img src="assets/logo.png" alt="" onerror="this.style.display='none'"><span>V+</span></div><div class="brand-text"><b>Vida+ AI</b><i>Home</i></div></div>
    <nav class="nav" id="nav">
      <button class="active" data-page="dashboard" onclick="navigate('dashboard')"><span class="ico">◧</span> Dashboard</button>
      <button data-page="financeiro" onclick="navigate('financeiro')"><span class="ico">₿</span> Financeiro</button>
      <button data-page="habitos" onclick="navigate('habitos')"><span class="ico">◍</span> Hábitos</button>
      <button data-page="humor" onclick="navigate('humor')"><span class="ico">☺</span> Humor</button>
      <button data-page="metas" onclick="navigate('metas')"><span class="ico">◎</span> Metas</button>
      <button data-page="relatorios" onclick="navigate('relatorios')"><span class="ico">✦</span> IA</button>
      <button data-page="conquistas" onclick="navigate('conquistas')"><span class="ico">★</span> Conquistas</button>
      <button data-page="perfil" onclick="navigate('perfil')"><span class="ico">👤</span> Perfil</button>
    </nav>
    <div class="sidebar-foot">
      <span class="premium-tag" id="premiumTag">Vida+ AI</span>
      <h4 id="sidebarName">Bem-vindo</h4>
      <p id="userEmailChip" style="font-size:11px;opacity:.9;word-break:break-all">Verificando login...</p>
      <div id="syncStatus" style="font-size:10px;margin-top:8px;opacity:.8">● Iniciando...</div>
      <button class="btn btn-white btn-sm" style="margin-top:10px;width:100%" onclick="window.open('admin.html','_blank')">Admin</button>
      <button class="btn btn-ghost btn-sm" style="margin-top:6px;background:rgba(255,255,255,.12);border:none;color:white;width:100%" onclick="doLogout()">Sair</button>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div class="search-wrap"><span class="sico">⌕</span><input id="globalSearch" placeholder="Buscar..." onkeydown="if(event.key==='Enter'){ const q=this.value; navigate('financeiro'); setTimeout(()=>{ const f=document.getElementById('pageFrame'); try{ f.contentWindow.postMessage({type:'search',q},'*'); }catch{} },800); }"></div>
      <div class="top-actions">
        <span class="chip"><span class="dot"></span> <span id="streakLabel">0d</span></span>
        <button class="btn btn-ghost btn-sm" onclick="toggleTheme()">◐</button>
        <div class="avatar" id="avatar" onclick="navigate('perfil')">U</div>
      </div>
    </div>

    <!-- HOME ESSENCIAL - SÓ ISSO CARREGA ANTES DO LOGIN -->
    <div id="homeEssential">
      <div style="font-size:42px">◧</div>
      <b style="font-size:18px;color:var(--text);display:block;margin-top:12px">Vida+ AI carregando...</b>
      <p style="font-size:13px;margin-top:6px">Verificando se está logado, depois carrega o resto sem erro</p>
      <p style="font-size:11px;margin-top:10px" id="loadingStep">1. Carregando Firebase...</p>
    </div>

    <!-- IFRAME REAL - SÓ CARREGA DEPOIS DO LOGIN -->
    <div id="pageFrameContainer">
      <iframe id="pageFrame" src="about:blank" loading="lazy" title="Conteúdo"></iframe>
    </div>
  </main>
</div>

<!-- LOGIN SIMPLES - SEM INFO ADMIN -->
<div class="overlay open" id="overlayAuth" style="z-index:150">
  <div class="modal" style="max-width:400px">
    <div style="padding:22px 22px 0;text-align:center">
      <img src="assets/logo.png" style="width:60px;height:60px;border-radius:14px;margin:0 auto 10px;display:block;object-fit:cover" onerror="this.style.display='none'">
      <h2 id="authTitle" style="font-size:24px">Entrar no Vida+ AI</h2>
      <p style="color:var(--muted);font-size:12px;margin-top:6px">Login com Google ou e-mail/senha</p>
      <div class="auth-tabs">
        <button class="active" id="tabLogin" onclick="switchAuth('login')">Entrar</button>
        <button id="tabSignup" onclick="switchAuth('signup')">Criar conta</button>
      </div>
    </div>
    <div style="padding:18px 20px;display:grid;gap:10px">
      <div id="loginView" style="display:grid;gap:10px">
        <button class="google-btn" id="btnGoogle" onclick="loginGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px"> Continuar com Google</button>
        <div class="divider">OU E-MAIL</div>
        <input id="email" class="input" type="email" placeholder="seu@email.com">
        <input id="pass" class="input" type="password" placeholder="Sua senha">
        <button class="btn btn-primary" id="btnLogin" onclick="loginEmail()" style="height:46px">Entrar</button>
        <span class="link" style="text-align:center;display:block" onclick="resetPass()">Esqueci senha</span>
      </div>
      <div id="signupView" style="display:none;gap:10px">
        <button class="google-btn" onclick="loginGoogle()"><img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" style="width:18px"> Cadastrar com Google</button>
        <div class="divider">OU</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><input id="firstName" class="input" placeholder="Nome"><input id="lastName" class="input" placeholder="Sobrenome"></div>
        <input id="emailSignup" class="input" type="email" placeholder="seu@email.com">
        <input id="passSignup" class="input" type="password" placeholder="Senha mín 6">
        <button class="btn btn-primary" id="btnSignup" onclick="signupEmail()" style="height:46px">Criar conta</button>
      </div>
      <div id="authError" style="display:none;padding:10px;border-radius:10px;background:#FEF2F2;border:1px solid #FECACA;color:#991B1B;font-size:12px"></div>
    </div>
  </div>
</div>

<div class="toast-stack" id="toasts"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, signOut, sendPasswordResetEmail, updateProfile, setPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
import { getDatabase, ref, set, get, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyB3PEDD9LwVeqSVYFkYvfl7GiXARJgLV6Q",
  authDomain: "vidamaisai.firebaseapp.com",
  databaseURL: "https://vidamaisai-default-rtdb.firebaseio.com",
  projectId: "vidamaisai",
  storageBucket: "vidamaisai.firebasestorage.app",
  messagingSenderId: "685977764265",
  appId: "1:685977764265:web:aab35e2d621856a3e6c4b8",
  measurementId: "G-2BJZ5C1F9G"
};
const ADMIN_EMAIL = "wesleystudio@gmail.com";
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);
setPersistence(auth, browserLocalPersistence).catch(()=>{});
const provider = new GoogleAuthProvider();
provider.setCustomParameters({prompt:'select_account'});

const $ = (id)=>document.getElementById(id);
function toast(msg, ico='✦'){
  const stack=$('toasts'); if(!stack) return;
  const el=document.createElement('div'); el.className='toast'; el.innerHTML=`<div class="t-ico">${ico}</div><div>${msg}</div>`; stack.appendChild(el);
  setTimeout(()=>{ el.style.opacity='0'; setTimeout(()=>el.remove(),300); },4000);
}
function showErr(msg){ const e=$('authError'); if(!e) return; if(!msg){ e.style.display='none'; return;} e.style.display='block'; e.textContent=msg; }

function step(msg){ const el=$('loadingStep'); if(el) el.textContent=msg; console.log('[Index]',msg); }

step('1. Firebase inicializado, verificando login...');

// Verifica redirect Google (celular)
getRedirectResult(auth).then(r=>{
  if(r && r.user){ toast('Google OK: '+r.user.email,'✓'); console.log('Redirect OK', r.user.email); }
}).catch(e=>{ console.warn('Redirect err', e.code, e.message); });

onAuthStateChanged(auth, async (user)=>{
  if(user){
    console.log('[Auth] Logado', user.email);
    step('2. Logado como '+user.email+' - carregando dados...');
    $('overlayAuth').classList.remove('open');
    $('userEmailChip').textContent=user.email;
    $('sidebarName').textContent='Olá, '+(user.displayName?.split(' ')[0]||user.email.split('@')[0]);
    $('avatar').textContent=(user.displayName||user.email||'U').charAt(0).toUpperCase();
    // garante dados no RTDB
    try{
      const snap=await get(ref(db, `vidaplus/users/${user.uid}`));
      if(!snap.exists()){
        const isAdmin=user.email.toLowerCase()===ADMIN_EMAIL.toLowerCase();
        const fullName=user.displayName||user.email.split('@')[0];
        const parts=fullName.split(' ');
        await set(ref(db, `vidaplus/users/${user.uid}`), {
          profile:{name:fullName, firstName:parts[0]||fullName, lastName:parts.slice(1).join(' ')||'', email:user.email, phone:'', photo:user.photoURL||'', currency:'BRL', premium:isAdmin, isAdmin:isAdmin, createdAt:new Date().toISOString(), lastLogin:new Date().toISOString()},
          user:{name:fullName, xp:0, level:1, joined:new Date().toISOString(), premium:isAdmin},
          app:{streak:0,maxStreak:0,premium:isAdmin,theme:'light',uid:user.uid,isAdmin:isAdmin},
          settings:{theme:'light',currency:'BRL',language:'pt-BR'},
          transactions:[], habits:[], moods:[], goals:[],
          _createdAt: serverTimestamp()
        });
        if(isAdmin){ await set(ref(db, `admin/users/${user.uid}`), {email:user.email, name:fullName, isAdmin:true, lastLogin:new Date().toISOString()}).catch(()=>{}); }
      }else{
        await update(ref(db, `vidaplus/users/${user.uid}/profile`), {lastLogin:new Date().toISOString()}).catch(()=>{});
      }
      step('3. Dados garantidos no RTDB, carregando páginas via iframe...');
    }catch(e){
      console.error('RTDB ensure error', e.code, e.message);
      step('3. Erro RTDB: '+e.message+' - mas continua...');
      if(e.code==='PERMISSION_DENIED'){
        toast('RTDB bloqueado, verifique Rules com seu email admin','⚠️');
      }
    }
    // Agora sim carrega o resto via iframe (como seu projeto que funciona)
    const urlParams=new URLSearchParams(location.search);
    const page=urlParams.get('page')||urlParams.get('id')||'dashboard';
    loadPage(page);
    $('homeEssential').style.display='none';
    $('pageFrameContainer').style.display='block';
    $('syncStatus').textContent='● Conectado • '+user.email.slice(0,12);
  }else{
    console.log('[Auth] Deslogado');
    step('2. Não logado - mostrando login...');
    $('overlayAuth').classList.add('open');
    $('homeEssential').style.display='block';
    $('homeEssential').innerHTML=`<div style="font-size:36px">🔒</div><b>Faça login para continuar</b><p style="font-size:12px;color:var(--muted);margin-top:6px">Login com Google ou e-mail/senha • Dados salvos em vidamaisai</p>`;
    $('pageFrameContainer').style.display='none';
    $('userEmailChip').textContent='Deslogado';
    $('sidebarName').textContent='Bem-vindo';
    $('avatar').textContent='U';
    $('syncStatus').textContent='● Offline - faça login';
  }
});

window.navigate=loadPage;
function loadPage(name){
  let n=(name||'dashboard').replace('.html','').toLowerCase();
  const allowed=['dashboard','financeiro','habitos','humor','metas','relatorios','conquistas','perfil'];
  if(!allowed.includes(n)) n='dashboard';
  document.querySelectorAll('.nav button').forEach(b=>{ b.classList.toggle('active', b.dataset.page===n); });
  try{ const url=new URL(location.href); url.searchParams.set('page', n); history.pushState({},'',url); }catch{}
  const frame=$('pageFrame');
  const home=$('homeEssential');
  const container=$('pageFrameContainer');
  if(home) home.style.display='none';
  if(container) container.style.display='block';
  // Tenta pages/ primeiro, depois raiz, como no seu projeto antigo que funcionava com páginas na raiz
  const tryUrls=[`pages/${n}.html`, `${n}.html`];
  // Para iframe, vamos tentar primeiro pages/, se falhar tenta raiz
  let src=tryUrls[0]+`?embedded=1&_=${Date.now()}`;
  frame.src=src;
  frame.onload=()=>{
    try{
      // auto resize iframe height (puxa tamanho do conteúdo)
      const doc=frame.contentDocument||frame.contentWindow.document;
      if(doc){
        const h=Math.max(doc.body.scrollHeight, doc.documentElement.scrollHeight);
        frame.style.height=(h+40)+'px';
      }
    }catch(e){
      // cross-origin? tenta via postMessage (pages enviam altura)
      console.log('Resize via postMessage aguardando...');
    }
    step(`4. Página ${n} carregada via iframe: ${frame.src}`);
  };
  frame.onerror=()=>{
    // tenta segunda url (raiz)
    if(frame.src.includes('pages/')){
      console.warn('pages/ falhou, tentando raiz');
      frame.src=`${n}.html?embedded=1&_=${Date.now()}`;
    }else{
      frame.srcdoc=`<div style="padding:20px;font-family:system-ui"><h3>Erro ao carregar ${n}</h3><p style="color:#64748B;font-size:13px">Verifique se pages/${n}.html existe no GitHub</p><p style="font-size:11px">Fallback: <a href="debug.html">Abrir debug.html</a></p></div>`;
    }
  };
  // escuta resize via postMessage das pages
  window.addEventListener('message', (e)=>{
    if(e.data && e.data.type==='resize' && e.data.height){
      frame.style.height=(e.data.height+40)+'px';
    }
    if(e.data && e.data.type==='search'){
      // repassa busca para iframe se precisar
    }
  });
}
window.addEventListener('popstate', ()=>{
  const p=new URLSearchParams(location.search).get('page')||'dashboard';
  loadPage(p);
});

window.switchAuth=(mode)=>{
  const lv=$('loginView'), sv=$('signupView'), tl=$('tabLogin'), ts=$('tabSignup');
  if(mode==='signup'){
    lv.style.display='none'; sv.style.display='grid'; tl.classList.remove('active'); ts.classList.add('active');
  }else{
    lv.style.display='grid'; sv.style.display='none'; tl.classList.add('active'); ts.classList.remove('active');
  }
  showErr('');
};

let busy=false;
window.loginEmail=async()=>{
  if(busy) return; busy=true;
  const email=$('email').value.trim(); const pass=$('pass').value;
  const btn=$('btnLogin');
  if(!email||!pass){ showErr('Digite e-mail e senha'); busy=false; return; }
  const orig=btn.textContent;
  try{ btn.textContent='Entrando...'; btn.disabled=true; showErr('');
    await signInWithEmailAndPassword(auth, email, pass);
  }catch(e){
    console.error(e);
    let m=e.message;
    if(e.code==='auth/invalid-credential') m='E-mail ou senha incorretos';
    if(e.code==='auth/unauthorized-domain') m=`Domínio ${location.hostname} não autorizado. Adicione em Firebase > Auth > Authorized domains`;
    if(e.code==='auth/network-request-failed') m='Sem internet';
    showErr(m+' ('+e.code+')');
  }finally{ busy=false; btn.textContent=orig; btn.disabled=false; }
};
window.signupEmail=async()=>{
  if(busy) return; busy=true;
  const fn=$('firstName').value.trim(); const ln=$('lastName').value.trim();
  const email=$('emailSignup').value.trim(); const pass=$('passSignup').value;
  if(!fn){ showErr('Nome obrigatório'); busy=false; return; }
  if(!email){ showErr('E-mail obrigatório'); busy=false; return; }
  if(!pass||pass.length<6){ showErr('Senha mín 6'); busy=false; return; }
  const btn=$('btnSignup'); const orig=btn.textContent;
  try{ btn.textContent='Criando...'; btn.disabled=true; showErr('');
    const cred=await createUserWithEmailAndPassword(auth, email, pass);
    const fullName=`${fn} ${ln}`.trim();
    if(fullName){ try{ await updateProfile(cred.user, {displayName:fullName}); }catch{} }
  }catch(e){
    console.error(e);
    let m=e.message;
    if(e.code==='auth/email-already-in-use') m='E-mail já existe, faça login';
    if(e.code==='auth/unauthorized-domain') m=`Domínio não autorizado: ${location.hostname}`;
    showErr(m+' ('+e.code+')');
  }finally{ busy=false; btn.textContent=orig; btn.disabled=false; }
};
window.loginGoogle=async()=>{
  if(busy) return; busy=true;
  const btns=document.querySelectorAll('#btnGoogle, [onclick*="Google"]');
  const origs=[...btns].map(b=>b.textContent);
  try{
    btns.forEach(b=>{ b.textContent='Conectando...'; b.disabled=true; });
    showErr('');
    try{
      await signInWithPopup(auth, provider);
    }catch(e){
      console.warn('Popup falhou, tentando redirect (celular)', e.code);
      if(e.code==='auth/popup-blocked' || e.code==='auth/popup-closed-by-user' || /mobile|android|iphone/i.test(navigator.userAgent)){
        await signInWithRedirect(auth, provider);
        return; // vai recarregar
      }
      throw e;
    }
  }catch(e){
    console.error(e);
    let m=e.message;
    if(e.code==='auth/unauthorized-domain') m=`Domínio ${location.hostname} não autorizado. Adicione em Firebase > Auth > Authorized domains > ${location.hostname}`;
    showErr(m+' ('+e.code+')');
  }finally{ busy=false; btns.forEach((b,i)=>{ b.textContent=origs[i]||'Continuar com Google'; b.disabled=false; }); }
};
window.resetPass=async()=>{
  const email=$('email').value.trim()||$('emailSignup').value.trim();
  if(!email){ showErr('Digite e-mail'); return; }
  try{ await sendPasswordResetEmail(auth, email); showErr('E-mail enviado para '+email); toast('E-mail enviado 📧','📧'); }catch(e){ showErr(e.message); }
};
window.doLogout=async()=>{
  if(!confirm('Sair?')) return;
  try{ await signOut(auth); localStorage.clear(); location.href='index.html'; }catch(e){ localStorage.clear(); location.reload(); }
};
window.toggleTheme=()=>{
  const cur=document.documentElement.getAttribute('data-theme')||'light';
  const next=cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme', next);
  localStorage.setItem('vidaplus_theme', next);
};
</script>
</body>
</html>

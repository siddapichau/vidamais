<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Conquistas - Vida+ AI</title><link rel="stylesheet" href="../css/style.css"><script>if(window.top===window.self && !location.search.includes('embedded')) location.replace('../index.html?page=conquistas');</script></head><body>
<div class="page-conquistas">

    <div class="grid grid-2" style="margin-top:16px;gap:10px">
      <div class="card" style="padding:12px"><b style="font-size:11px;letter-spacing:.08em;color:var(--muted)">STREAK MÁXIMO</b><div style="font-size:20px;font-weight:800" id="achStreak">0 dias</div></div>

      <div class="card" style="padding:12px"><b style="font-size:11px;letter-spacing:.08em;color:var(--muted)">PROJEÇÃO NÍVEL 50</b><div style="font-size:14px;font-weight:800" id="proj50">~320 dias</div></div>
    </div>
    <div class="card" style="margin-top:16px"><b>Trilha de 50 níveis</b><div id="levelTrail" style="max-height:320px;overflow:auto;margin-top:12px;display:grid;gap:6px"></div></div>
    </div>
    <div class="card"><b>Medalhas</b><div id="achList" style="display:grid;gap:10px;margin-top:12px"></div></div>
  </div>
</div>

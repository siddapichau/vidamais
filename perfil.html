<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; }
        .theme-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 15px; }
        .theme-card { border: 2px solid var(--border); padding: 15px; border-radius: 12px; cursor: pointer; text-align: center; }
        .theme-card.active { border-color: var(--primary); background: var(--bg-2); }
    </style>
</head>
<body>
    <h2>Configurações de Perfil</h2>
    
    <div class="card" style="margin-top: 20px;">
        <h3>Escolha seu Tema</h3>
        <p style="font-size: 13px; color: var(--muted);">Temas premium custam 500 moedas para desbloqueio vitalício.</p>
        
        <div class="theme-grid" id="themesList">
            <!-- Gerado via JS -->
        </div>
    </div>

    <div class="card" style="margin-top: 20px;">
        <h3>Sua Conta</h3>
        <p id="userEmail" style="margin-bottom: 15px;"></p>
        <button class="btn-ghost" onclick="parent.logout()">Sair da Conta</button>
    </div>

    <script type="module">
        import { state, themes } from './core.js';

        function renderThemes() {
            const list = document.getElementById('themesList');
            list.innerHTML = '';
            
            Object.keys(themes).forEach(key => {
                const isPremium = themes[key].premium;
                const isActive = state.settings.theme.startsWith(key);
                
                const div = document.createElement('div');
                div.className = `theme-card ${isActive ? 'active' : ''}`;
                div.innerHTML = `
                    <div style="font-weight: 800; font-size: 14px;">${themes[key].label}</div>
                    <div style="font-size: 11px; margin-top: 5px;">${isPremium ? '💎 Premium' : 'Grátis'}</div>
                `;
                div.onclick = () => {
                    parent.appSelectTheme(key);
                    renderThemes();
                };
                list.appendChild(div);
            });
        }

        document.getElementById('userEmail').textContent = state.profile.email || 'Usuário Local';
        renderThemes();
    </script>
</body>
</html>

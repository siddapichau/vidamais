<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin • Controle Total</title>
<link rel="stylesheet" href="css/style.css">
<style>
.admin{max-width:1200px;margin:0 auto;padding:20px;}
.user-card{background:var(--bg-2); padding:16px; border-radius:12px; margin-bottom:12px; border:1px solid var(--border);}
.user-info{display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:10px;}
</style>
</head>
<body style="background:var(--card)">
<div class="admin">
  <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <h2>Painel de Controle Admin</h2>
    <button class="btn btn-ghost" onclick="location.href='index.html'">Voltar para o App</button>
  </div>

  <div class="grid grid-2">
    <div class="card">
      <h3 style="margin-bottom:10px;">Gestão de Temas do Sistema</h3>
      <p style="font-size:12px; color:var(--muted); margin-bottom:16px;">Selecione quais temas são liberados para contas Free vs Premium (Aplica direto no banco de dados do App).</p>
      
      <div style="display:grid; gap:8px;">
        <label><input type="checkbox" checked disabled> Light / Dark (Padrão)</label>
        <label><input type="checkbox" checked> Dracula (Requer Premium)</label>
        <label><input type="checkbox" checked> Cyberpunk (Requer Premium)</label>
        <label><input type="checkbox" checked> Aurora (Requer Premium)</label>
      </div>
      <button class="btn btn-primary btn-sm" style="margin-top:16px;" onclick="alert('Políticas de temas salvas no Servidor.')">Salvar Políticas de Temas</button>
    </div>

    <div class="card">
      <h3 style="margin-bottom:10px;">Gestão de Clientes (Usuários)</h3>
      <button class="btn btn-primary btn-sm" onclick="loadAllClients()">↻ Recarregar Clientes do Banco</button>
      
      <div id="clientList" style="margin-top:16px; max-height:400px; overflow-y:auto;">
        <p style="font-size:12px; color:var(--muted)">Clique em recarregar para listar a base.</p>
      </div>
    </div>
  </div>
</div>

<script type="module">
import { VidaFirebase } from './js/firebase.js';

window.loadAllClients = async () => {
  const container = document.getElementById('clientList');
  container.innerHTML = '<p>Buscando no Firebase...</p>';
  try {
    const list = await VidaFirebase.adminListUsers();
    container.innerHTML = '';
    list.forEach(u => {
      container.innerHTML += `
        <div class="user-card">
          <div class="user-info">
            <div>
              <b>${u.name || 'Sem nome cadastrado'}</b> ${u.premium ? '💎 (Premium)' : ''}<br>
              <small style="color:var(--muted)">Email: ${u.email}</small><br>
              <small style="color:var(--muted)">Telefone: ${u.phone || 'N/A'}</small>
            </div>
            <div>
              <button class="btn btn-ghost btn-sm" onclick="alert('Função em desenvolvimento. ID: ${u.uid}')">Tornar Premium</button>
            </div>
          </div>
        </div>
      `;
    });
  } catch(e) {
    container.innerHTML = `<p style="color:red">Erro: Você não está logado como admin ou a regra do banco bloqueou.</p>`;
  }
};
</script>
</body>
</html>

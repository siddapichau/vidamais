<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Vida+ AI</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { padding: 20px; background: var(--bg); color: var(--text); }
        .section { margin-bottom: 40px; }
        .level-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: center; }
        .menu-item { background: var(--card); padding: 15px; border: 1px solid var(--border); border-radius: 10px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div class="topbar">
        <h1>Painel Administrativo</h1>
        <button class="btn-primary" onclick="saveAll()">Salvar Todas as Alterações</button>
    </div>

    <!-- Gestão de Menu -->
    <div class="section">
        <h2>Ordem e Itens do Menu</h2>
        <div id="menuList"></div>
        <button class="btn-ghost" onclick="addMenuItem()">+ Adicionar Menu</button>
    </div>

    <!-- Gestão de Níveis -->
    <div class="section">
        <h2>Configuração de Níveis (1 a 50)</h2>
        <div id="levelsList" style="max-height: 400px; overflow-y: auto; border: 1px solid var(--border); padding: 10px; border-radius: 10px;">
            <!-- Gerado via JS -->
        </div>
    </div>

    <!-- AdMob -->
    <div class="section">
        <h2>Monetização (AdMob IDs)</h2>
        <div class="admin-card">
            <label>App Open ID</label>
            <input type="text" id="ad_appopen" class="admin-input" placeholder="ca-app-pub-...">
            <label>Banner Rodapé ID</label>
            <input type="text" id="ad_banner" class="admin-input" placeholder="ca-app-pub-...">
            <label>Rewarded Ad (Ganhar Moedas) ID</label>
            <input type="text" id="ad_rewarded" class="admin-input" placeholder="ca-app-pub-...">
        </div>
    </div>

    <script type="module">
        import { db } from './firebase.js';
        import { ref, get, set } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

        let currentMenu = [];
        let currentLevels = [];

        async function loadData() {
            // Load Menu
            const mSnap = await get(ref(db, 'admin/menu'));
            currentMenu = mSnap.exists() ? mSnap.val() : [
                { label: 'Home', page: 'home.html', icon: '🏠', order: 0 },
                { label: 'Dashboard', page: 'dashboard.html', icon: '📊', order: 1 }
            ];
            renderMenu();

            // Load Levels
            const lSnap = await get(ref(db, 'admin/levels'));
            if (lSnap.exists()) {
                currentLevels = lSnap.val();
            } else {
                for(let i=1; i<=50; i++) {
                    currentLevels.push({ level: i, xp: i*1000, name: `Nível ${i}`, benefit: 'Bônus em breve' });
                }
            }
            renderLevels();

            // Load AdMob
            const aSnap = await get(ref(db, 'admin/admob'));
            if (aSnap.exists()) {
                const ad = aSnap.val();
                document.getElementById('ad_appopen').value = ad.appOpenId || '';
                document.getElementById('ad_banner').value = ad.bannerId || '';
                document.getElementById('ad_rewarded').value = ad.rewardedId || '';
            }
        }

        function renderMenu() {
            const list = document.getElementById('menuList');
            list.innerHTML = '';
            currentMenu.forEach((item, index) => {
                const div = document.createElement('div');
                div.className = 'menu-item';
                div.innerHTML = `
                    <div>
                        <input type="text" value="${item.label}" onchange="updateMenu(${index}, 'label', this.value)" style="width:100px">
                        <input type="text" value="${item.page}" onchange="updateMenu(${index}, 'page', this.value)" style="width:150px">
                        <input type="text" value="${item.icon}" onchange="updateMenu(${index}, 'icon', this.value)" style="width:40px">
                    </div>
                    <button onclick="removeMenu(${index})">🗑️</button>
                `;
                list.appendChild(div);
            });
        }

        window.updateMenu = (index, key, val) => { currentMenu[index][key] = val; };
        window.removeMenu = (index) => { currentMenu.splice(index, 1); renderMenu(); };
        window.addMenuItem = () => { currentMenu.push({label:'Novo', page:'new.html', icon:'•', order:currentMenu.length}); renderMenu(); };

        function renderLevels() {
            const list = document.getElementById('levelsList');
            list.innerHTML = '';
            currentLevels.forEach((lvl, index) => {
                const div = document.createElement('div');
                div.className = 'level-row';
                div.innerHTML = `
                    <span>#${lvl.level}</span>
                    <input type="text" value="${lvl.name}" placeholder="Nome" onchange="updateLevel(${index}, 'name', this.value)">
                    <input type="number" value="${lvl.xp}" placeholder="XP" onchange="updateLevel(${index}, 'xp', parseInt(this.value))">
                    <input type="text" value="${lvl.benefit || ''}" placeholder="Vantagem" onchange="updateLevel(${index}, 'benefit', this.value)" style="flex:1">
                `;
                list.appendChild(div);
            });
        }

        window.updateLevel = (index, key, val) => { currentLevels[index][key] = val; };

        window.saveAll = async () => {
            try {
                await set(ref(db, 'admin/menu'), currentMenu);
                await set(ref(db, 'admin/levels'), currentLevels);
                await set(ref(db, 'admin/admob'), {
                    appOpenId: document.getElementById('ad_appopen').value,
                    bannerId: document.getElementById('ad_banner').value,
                    rewardedId: document.getElementById('ad_rewarded').value
                });
                alert("Configurações salvas com sucesso!");
            } catch (e) {
                alert("Erro ao salvar: " + e.message);
            }
        };

        loadData();
    </script>
</body>
</html>
